    <title>해오름안과</title>

<style>
        .form {
			position: relative;
			z-index: 1;
			background: #FFFFFF;
			max-width: 360px;
			margin: 0 auto 100px;
			margin-top:100px;
			padding: 45px;
			text-align: center;
			box-shadow: 0 0 20px 0 rgba(0, 0, 0, 0.2), 0 5px 5px 0 rgba(0, 0, 0, 0.24);
		}
		.form table{width:100%; }
		.form table th{text-align: left; padding-left:10px;}
		.form input {
			font-family: "Roboto", sans-serif;
			outline: 0;
			background: #f3f3f3;
			width: 100%;
			border: 0;
			margin: 0 0 15px;
			padding: 15px;
			box-sizing: border-box;
			font-size: 14px;
		}
		.form button {
			font-family: "Roboto", sans-serif;
			text-transform: uppercase;
			outline: 0;
			background: #2c51c0;
			width: 100%;
			border: 0;
			padding: 15px;
			color: #FFFFFF;
			font-size: 14px;
			-webkit-transition: all 0.3 ease;
			transition: all 0.3 ease;
			cursor: pointer;
		}
		
		.form button:hover,.form button:active,.form button:focus {
			background: #4a6ac7;
		}
		.form .message {
			margin: 15px 0 0;
			color: #b3b3b3;
			font-size: 12px;
		}
		
		.form .message a {
			color: #343a40;
			text-decoration: none;
		}
		.form .register-form {
			display: none;
		}
    </style>
</head>
<body>
	<div class="wrap">
        <header id="header" name="header" class="header"></header> 
	<div id="ct">
	        <div class="loginbox">
	            <div class="login-page">
	          <div class="form">
	            <form action="" name="join_form" method="post" onsubmit="return joinCheck(this)">
		<table>
			<tbody>
				<tr>
					<th><label for="userid">아이디</label></th>
				</tr>
				<tr>	
					<td>
						<label for="아이디"></label>
                        <input type="text" name="userid" id="userid" required onchange="idCheck()" pattern="^[a-z0-9]+$" placeholder="아이디를 입력하세요">
                        <input type="text" name="userid" value="" onchange="idCheck()" placeholder="중복체크">
					</td>
				</tr>
				<tr>
					<th><label for="username">이름</label></th>
				</tr>
				<tr>
					<td>
						<input type="text" name="username" id="username" placeholder="이름을 입력하세요" />
					</td>
				</tr>
				<tr>
					<th><label for="userpw">비밀번호</label></th>
				</tr>
				<tr>
					<td>
						<input type="password" name="userpw" id="userpw" />
						<!-- pattern="^(?=.*[A-Za-z])(?=.*\d)(?=.*[$@$!%*#?&])[A-Za-z\d$@$!%*#?&]{1,16}$" -->
					</td>
				</tr>
				<tr>
					<th><label for="userpw2">비밀번호 확인</label></th>
				</tr>
				<tr>
					<td>
						<input type="password" name="userpw2" id="userpw2" />
					</td>
				</tr>
				<tr>
					<th><label for="email">이메일</label></th>
				</tr>
				<tr>
					<td>
						<input type="email" name="email" id="email" pattern="[a-z0-9._%+-]+@[a-z0-9.-]+\.[a-z]{2,3}$" />
					</td>
				</tr>
				<tr>
					<th><label for="tel">전화번호</label></th>
				</tr>
				<tr>
					<td>
						<input type="text" name="tel" id="tel" />
					</td>
				</tr>
				<tr>
					<th><label for="addr1">주소</label></th>
				</tr>
				<tr>
					<td>
						<input type="text" name="addr1" id="addr1" onclick="findAddr()" placeholder="주소찾기" />
					</td>					
				</tr>
				<tr>
					<th><label for="postcode">우편번호</label></th>
				</tr>
				<tr>
					<td><input type="text" name="postcode" id="postcode" /></td>
				</tr>
				<tr>
					<th><label for="addr2">상세주소</label></th>
				</tr>
				<tr>
					<td><input type="text" name="addr2" id="addr2" /></td>
				</tr>
				<tr>
					<th><label for="birth">생년월일</label></th>
				</tr>
				<tr>
					<td><input type="date" name="birth" id="birth" /></td>
				</tr>
			</tbody>
		</table>
		<button type="submit">join</button>
	</form>
	          </div>
	        </div>
	        </div>
	    </div>
	
	
	<script>
	    function findAddr() {
	           new daum.Postcode({
	                  oncomplete: function(data) {
	                      // 팝업에서 검색결과 항목을 클릭했을때 실행할 코드를 작성하는 부분.

	                      // 각 주소의 노출 규칙에 따라 주소를 조합한다.
	                      // 내려오는 변수가 값이 없는 경우엔 공백('')값을 가지므로, 이를 참고하여 분기 한다.
	                      var addr = ''; // 주소 변수
	                      var extraAddr = ''; // 참고항목 변수

	                      //사용자가 선택한 주소 타입에 따라 해당 주소 값을 가져온다.
	                      if (data.userSelectedType === 'R') { // 사용자가 도로명 주소를 선택했을 경우
	                          addr = data.roadAddress;
	                      } else { // 사용자가 지번 주소를 선택했을 경우(J)
	                          addr = data.jibunAddress;
	                      }

	                      // 사용자가 선택한 주소가 도로명 타입일때 참고항목을 조합한다.
	                      if(data.userSelectedType === 'R'){
	                          // 법정동명이 있을 경우 추가한다. (법정리는 제외)
	                          // 법정동의 경우 마지막 문자가 "동/로/가"로 끝난다.
	                          if(data.bname !== '' && /[동|로|가]$/g.test(data.bname)){
	                              extraAddr += data.bname;
	                          }
	                          // 건물명이 있고, 공동주택일 경우 추가한다.
	                          if(data.buildingName !== '' && data.apartment === 'Y'){
	                              extraAddr += (extraAddr !== '' ? ', ' + data.buildingName : data.buildingName);
	                          }
	                          // 표시할 참고항목이 있을 경우, 괄호까지 추가한 최종 문자열을 만든다.
	                          if(extraAddr !== ''){
	                              extraAddr = ' (' + extraAddr + ')';
	                          }
	                          // 조합된 참고항목을 해당 필드에 넣는다.
	                         
	                      
	                      } else {
	                         
	                      }

	                      // 우편번호와 주소 정보를 해당 필드에 넣는다.
	                      document.getElementById("postcode").value = data.zonecode;   //우편번호
	                      document.getElementById("addr1").value = addr;            //주소1
	                      // 커서를 상세주소 필드로 이동한다.
	                      document.getElementById("addr2").focus();               //주소2(상세주소)
	                  }
	              }).open();
	    }
		</script>
		<script src="https://t1.daumcdn.net/mapjsapi/bundle/postcode/prod/postcode.v2.js"></script>
		
		<script>
		function idCheck() {
			var uid = document.join_form.userid.value;
			if(uid==""){
				alert("아이디를 입력하여 주시기 바랍니다.");
				return false;
			} else {
				location.href="${path }/member/idCheck.do?userid="+uid;
			}
		}
		</script>
		<script>
		function joinCheck(f) {
			if(f.userpw.value!=f.userpw2.value){
				alert("비밀번호가 일치하지 않습니다.");
				return false;
			}
			if(f.ck.value!="yes"){
				alert("아이디 중복 확인이 필요합니다.");
				return false;
			}
		}		
		</script>
		<footer id="footer" class="header" name="header"></footer>
	</div>
    <script> 
        $(function(){
          $("#header").load("header.html"); 
          $("#footer").load("footer.html"); 
        });
    </script>
	<script>
	$(function(){
		$("#header").load("header.html"); 
		$("#footer").load("footer.html"); 
	});
</script>
